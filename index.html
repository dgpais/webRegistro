<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorers - Agencia de Viajes</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: linear-gradient(135deg, #7a9b9e 0%, #ef4855 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Quicksand', 'Segoe UI', Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }
    .main-container {
      background: rgba(255,255,255,0.92);
      border-radius: 32px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.18);
      padding: 3.5rem 2.5rem 2.5rem 2.5rem;
      max-width: 600px;
      width: 95vw;
      text-align: center;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeInMain 1.2s ease 0.2s forwards;
    }
    @keyframes fadeInMain {
      from { opacity: 0; transform: translateY(40px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .main-title {
      font-family: 'Pacifico', cursive;
      font-size: 2.8rem;
      color: #ef4855;
      margin-bottom: 1.2rem;
      letter-spacing: 2px;
      text-shadow: 0 4px 24px rgba(239,72,85,0.10);
      animation: blinkTitle 2.5s infinite alternate;
    }
    @keyframes blinkTitle {
      0% { filter: brightness(1.1) drop-shadow(0 0 0 #ef4855); }
      60% { filter: brightness(1.2) drop-shadow(0 0 8px #ef4855cc); }
      100% { filter: brightness(1.05) drop-shadow(0 0 0 #ef4855); }
    }
        /* Efecto zoom en imágenes laterales */
        .side-img-effect {
          transition: transform 0.35s cubic-bezier(.25,.8,.25,1), box-shadow 0.25s;
          will-change: transform, box-shadow;
          cursor: pointer;
        }
        .side-img-effect:hover {
          transform: scale(1.13) rotate(-2deg);
          box-shadow: 0 8px 32px rgba(239,72,85,0.18), 0 2px 8px rgba(0,0,0,0.10);
          z-index: 10;
        }
    .subtitle {
      font-size: 1.5rem;
      color: #1a202c;
      font-weight: 700;
      margin-bottom: 2.2rem;
      line-height: 1.3;
    }
    .desc {
      font-size: 1.15rem;
      color: #444;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }
    .home-link {
      display: inline-block;
      background: linear-gradient(135deg, #1a237e 0%, #7a9b9e 100%);
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 0.9rem 2.2rem;
      border-radius: 14px;
      text-decoration: none;
      box-shadow: 0 4px 18px rgba(26,35,126,0.13);
      transition: background 0.2s, transform 0.2s;
      margin-top: 1.2rem;
    }
    .home-link:hover {
      background: linear-gradient(135deg, #ef4855 0%, #e63946 100%);
      color: #fff;
      transform: translateY(-2px) scale(1.04);
    }
    @media (max-width: 600px) {
      .main-container {
        padding: 2rem 0.7rem 1.5rem 0.7rem;
      }
      .main-title {
        font-size: 2rem;
      }
      .subtitle {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div style="display:flex;align-items:stretch;justify-content:center;width:100vw;min-height:100vh;padding:0;">
    <!-- Imagen izquierda -->
    <div style="flex:0 0 28vw;display:flex;align-items:stretch;justify-content:flex-start;margin:0;padding:0;min-width:220px;max-width:420px;height:100vh;">
      <img src="images/izertis.png" alt="Izertis" class="side-img-effect" style="width:100%;height:100vh;max-width:none;max-height:none;object-fit:cover;border-radius:0 18px 18px 0;box-shadow:0 2px 12px rgba(0,0,0,0.10);background:#fff;padding:0;align-self:stretch;display:block;" />
    </div>
    <!-- Contenido central -->
    <div class="main-container" style="display:flex;flex-direction:column;justify-content:center;align-items:center;min-width:320px;max-width:600px;width:38vw;">
      <div class="main-title" id="mainTitle" style="display:flex;align-items:center;justify-content:center;gap:0.7rem;opacity:0;position:relative;top:-2.5rem;color:#102a43;"></div>
      <div style="height:3.5rem;"></div>
      <div class="subtitle" id="mainSubtitle" style="opacity:0;color:#102a43;"></div>
      <div class="desc" id="mainDesc" style="opacity:0;color:#102a43;"></div>
      <a class="home-link" href="home.html" style="margin-top:1.2rem;">Entrar a la web</a>
      <script>
        // Animación de texto progresiva para el cuadro central
        document.addEventListener('DOMContentLoaded', function() {
          // Textos a animar
          const titleHTML = '<span style="display:inline-block;line-height:1;">EXPLORERS</span>';
          const subtitleText = 'Tu agencia de viajes para descubrir el mundo';
          const descText = 'Viajar es mucho más que moverse de un lugar a otro: es descubrir, aprender, emocionarse y crear recuerdos inolvidables.<br><br>En <b>Explorers</b> te ayudamos a vivir experiencias únicas, a conocer culturas fascinantes y a disfrutar de la belleza de nuestro planeta. <br><br>¡Haz de cada viaje una aventura extraordinaria!<br>';
          // Elementos
          const mainTitle = document.getElementById('mainTitle');
          const mainSubtitle = document.getElementById('mainSubtitle');
          const mainDesc = document.getElementById('mainDesc');
          // Animar título (con HTML)
          setTimeout(() => {
            mainTitle.innerHTML = titleHTML;
            mainTitle.style.transition = 'opacity 0.7s';
            mainTitle.style.opacity = 1;
          }, 400);
          // Animar subtítulo
          setTimeout(() => {
            let i = 0;
            mainSubtitle.textContent = '';
            mainSubtitle.style.transition = 'opacity 0.7s';
            mainSubtitle.style.opacity = 1;
            function typeSubtitle() {
              if (i <= subtitleText.length) {
                mainSubtitle.textContent = subtitleText.slice(0, i);
                i++;
                setTimeout(typeSubtitle, 18);
              }
            }
            typeSubtitle();
          }, 1100);
          // Animar descripción
          setTimeout(() => {
            let i = 0;
            let plain = descText.replace(/<br>/g, '\n').replace(/<[^>]+>/g, '');
            mainDesc.innerHTML = '';
            mainDesc.style.transition = 'opacity 0.7s';
            mainDesc.style.opacity = 1;
            function typeDesc() {
              if (i <= descText.length) {
                // Mostrar HTML progresivamente
                mainDesc.innerHTML = descText.slice(0, i);
                i++;
                setTimeout(typeDesc, 7);
              }
            }
            typeDesc();
          }, 2200);
        });
      </script>
    </div>
    <!-- Imágenes verticales derecha -->
    <div style="flex:0 0 38vw;display:flex;flex-direction:column;align-items:center;justify-content:space-between;height:100vh;margin:0;padding:0;gap:1.2rem;max-width:600px;min-width:320px;">
      <img src="images/egipto.jpg" alt="Egipto" class="side-img-effect" style="width:100%;height:33.33%;max-width:none;max-height:none;object-fit:cover;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.10);background:#fff;padding:0.3rem;align-self:stretch;display:block;" />
      <img src="images/españa.jpg" alt="España" class="side-img-effect" style="width:100%;height:33.33%;max-width:none;max-height:none;object-fit:cover;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.10);background:#fff;padding:0.3rem;align-self:stretch;display:block;" />
      <img src="images/parques.jpg" alt="Parques" class="side-img-effect" style="width:100%;height:33.33%;max-width:none;max-height:none;object-fit:cover;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.10);background:#fff;padding:0.3rem;align-self:stretch;display:block;" />
    </div>
  </div>
</body>
</html>
