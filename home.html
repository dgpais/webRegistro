<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - WebRegistro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7a9b9e 0%, #6b8b8e 50%, #5c7b7e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(239, 72, 85, 0.15), transparent);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            animation: float 8s ease-in-out infinite;
        }
        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(122, 155, 158, 0.2), transparent);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            animation: float 10s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
            animation: slideIn 0.5s ease-out;
            text-align: center;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .welcome {
            font-size: 1.5rem;
            color: #1a202c;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .logo-small {
            width: 40px;
            height: 40px;
        }
        .logout-btn {
            background: linear-gradient(135deg, #ef4855 0%, #e63946 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(239, 72, 85, 0.3);
        }
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 72, 85, 0.5);
            background: linear-gradient(135deg, #e63946 0%, #d62839 100%);
        }
        .actions {
            margin-top: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }
        .action-btn {
            background: linear-gradient(135deg, #7a9b9e 0%, #6b8b8e 100%);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(122, 155, 158, 0.2);
            text-decoration: none;
            display: inline-block;
        }
        .action-btn:hover {
            background: linear-gradient(135deg, #ef4855 0%, #e63946 100%);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 72, 85, 0.3);
        }
        .login-link {
            margin-top: 2.5rem;
            color: #1976d2;
            text-decoration: none;
            font-size: 1.1em;
            display: inline-block;
        }
        .login-link:hover { text-decoration: underline; }
        @media (max-width: 768px) {
            .container { padding: 1.5rem; }
            .header { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>

                ¡Bienvenido a WebRegistro!
            </span>
            <button id="logoutBtn" class="logout-btn">Cerrar sesión</button>
        </div>

        </div>
    </div>
    <script>
        // Botón cerrar sesión

</body>
</html>
