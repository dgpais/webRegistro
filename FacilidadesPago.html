<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sobre Nosotros</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7a9b9e 0%, #6b8b8e 50%, #5c7b7e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(239, 72, 85, 0.15), transparent);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            animation: float 8s ease-in-out infinite;
        }
        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(122, 155, 158, 0.2), transparent);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            animation: float 10s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
            animation: slideIn 0.5s ease-out;
            text-align: center;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page-title {
            font-size: 2rem;
            color: #1a202c;
            font-weight: 700;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <a href="home.html" style="position:absolute;top:30px;left:30px;z-index:2;text-decoration:none;background:#fff;padding:0.6rem 1.2rem;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);font-weight:600;color:#1a202c;transition:background 0.2s;">⟵ Volver a Home</a>
    <div class="container">
        <div class="page-title">Facilidades de Pago</div>
        <!-- Contenido aquí -->
            <!-- Caja de Dinero -->
            <div style="background:#e3f2fd;padding:1.5rem 2rem 2rem 2rem;border-radius:16px;margin-bottom:2.2rem;box-shadow:0 2px 12px rgba(122,155,158,0.08);max-width:420px;margin-left:auto;margin-right:auto;">
                <div style="font-size:1.15rem;font-weight:600;color:#1976d2;margin-bottom:0.7rem;">Caja de dinero</div>
                <div style="font-size:1.05rem;margin-bottom:1.2rem;">Saldo actual: <span id="saldo-caja" style="font-weight:700;color:#388e3c;">356</span> €</div>
                <form id="form-recarga" style="display:flex;gap:0.7rem;justify-content:center;align-items:center;">
                    <label for="recarga" style="font-weight:500;">Recargar:</label>
                    <input type="number" id="recarga" name="recarga" min="1" max="10000" step="1" style="padding:0.4rem 0.7rem;border-radius:8px;border:1px solid #b0bec5;width:90px;" required>
                    <button type="submit" style="background:#7a9b9e;color:#fff;padding:0.4rem 1.2rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Recargar</button>
                </form>
                <div id="mensaje-recarga" style="margin-top:0.7rem;color:#388e3c;font-weight:500;display:none;">Recarga realizada correctamente.</div>
            </div>

            <!-- Configuración de Métodos de Pago -->
            <div style="background:#f7f7f7;padding:2rem 2.2rem 2.2rem 2.2rem;border-radius:16px;box-shadow:0 2px 12px rgba(122,155,158,0.08);max-width:520px;margin-left:auto;margin-right:auto;">
                <div style="font-size:1.15rem;font-weight:600;color:#1976d2;margin-bottom:1.2rem;">Configura tus métodos de pago</div>
                <form style="display:flex;flex-direction:column;gap:1.2rem;">
                    <div style="text-align:left;">
                        <label style="font-weight:500;">Tarjeta de crédito:</label><br>
                        <input type="text" placeholder="Número de tarjeta" maxlength="19" style="margin-top:0.3rem;padding:0.4rem 0.7rem;border-radius:8px;border:1px solid #b0bec5;width:220px;">
                        <input type="text" placeholder="MM/AA" maxlength="5" style="margin-left:0.7rem;padding:0.4rem 0.7rem;border-radius:8px;border:1px solid #b0bec5;width:60px;">
                        <input type="text" placeholder="CVV" maxlength="4" style="margin-left:0.7rem;padding:0.4rem 0.7rem;border-radius:8px;border:1px solid #b0bec5;width:50px;">
                    </div>
                    <div style="text-align:left;">
                        <label style="font-weight:500;">PayPal:</label><br>
                        <input type="email" placeholder="Correo de PayPal" style="margin-top:0.3rem;padding:0.4rem 0.7rem;border-radius:8px;border:1px solid #b0bec5;width:220px;">
                    </div>
                    <div style="text-align:left;">
                        <label style="font-weight:500;">Transferencia bancaria:</label><br>
                        <input type="text" placeholder="IBAN" maxlength="34" style="margin-top:0.3rem;padding:0.4rem 0.7rem;border-radius:8px;border:1px solid #b0bec5;width:260px;">
                    </div>
                </form>
            </div>
    </div>
</body>
    <script>
        // Lógica de recarga de caja
        let saldo = 356;
        const saldoCaja = document.getElementById('saldo-caja');
        const formRecarga = document.getElementById('form-recarga');
        const mensajeRecarga = document.getElementById('mensaje-recarga');
        formRecarga.addEventListener('submit', function(e) {
            e.preventDefault();
            const cantidad = parseInt(document.getElementById('recarga').value, 10);
            if (!isNaN(cantidad) && cantidad > 0) {
                saldo += cantidad;
                saldoCaja.textContent = saldo;
                mensajeRecarga.style.display = 'block';
                setTimeout(() => { mensajeRecarga.style.display = 'none'; }, 2000);
                formRecarga.reset();
            }
        });
    </script>
</html>
