<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso Agencias</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7a9b9e 0%, #6b8b8e 50%, #5c7b7e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(239, 72, 85, 0.15), transparent);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            animation: float 8s ease-in-out infinite;
        }
        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(122, 155, 158, 0.2), transparent);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            animation: float 10s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
            animation: slideIn 0.5s ease-out;
            text-align: center;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page-title {
            font-size: 2rem;
            color: #1a202c;
            font-weight: 700;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="welcome">
                <img class="logo-small" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjgwIiBoZWlnaHQ9IjI4MCIgdmlld0JveD0iMCAwIDI4MCAyODAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIyODAiIGhlaWdodD0iMjgwIiByeD0iMTAiIGZpbGw9IiNGRjU1NjYiLz4KPHRleHQgeD0iNTAlIiB5PSI1OCUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSI3MCIgZm9udC13ZWlnaHQ9ImJvbGQiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIj5pemVydGlzPC90ZXh0Pgo8L3N2Zz4=" alt="izertis" />
                Búsqueda Agencias
            </span>
            <button id="logoutBtn" class="logout-btn">Cerrar sesión</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar agencia o contacto..." />
        </div>
        <div class="results-info" id="resultsInfo"></div>
        <div class="table-wrapper">
            <table class="products-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Contacto</th>
                        <th>Teléfono</th>
                    </tr>
                </thead>
                <tbody id="productsTable"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
        <script>
        if (!sessionStorage.getItem("authenticated")) {
            alert("Debe iniciar sesión para acceder a esta página");
            window.location.href = "index.html";
        }
        const products = [
            { id: 1, marca: "Viajes Sol", modelo: "sol@agencia.com", stock: "912345678" },
            { id: 2, marca: "Agencia Rural", modelo: "rural@agencia.com", stock: "934567890" },
            { id: 3, marca: "Turismo Plus", modelo: "plus@agencia.com", stock: "956789012" },
            { id: 4, marca: "Vacaciones Ya", modelo: "ya@agencia.com", stock: "987654321" },
            { id: 5, marca: "Mundo Viaje", modelo: "mundo@agencia.com", stock: "900123456" },
        ];
        let filteredProducts = [...products];
        let currentPage = 1;
        const itemsPerPage = 5;
        const logoutBtn = document.getElementById("logoutBtn");
        const searchInput = document.getElementById("searchInput");
        const productsTable = document.getElementById("productsTable");
        const pagination = document.getElementById("pagination");
        const resultsInfo = document.getElementById("resultsInfo");
        logoutBtn.addEventListener("click", function () {
            sessionStorage.removeItem("authenticated");
            sessionStorage.removeItem("username");
            window.location.href = "index.html";
        });
        searchInput.addEventListener("input", function () {
            const searchTerm = this.value.toLowerCase();
            filteredProducts = products.filter(
                (product) =>
                    product.marca.toLowerCase().includes(searchTerm) ||
                    product.modelo.toLowerCase().includes(searchTerm),
            );
            currentPage = 1;
            displayProducts();
            displayPagination();
            updateResultsInfo();
        });
        function displayProducts() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageProducts = filteredProducts.slice(start, end);
            productsTable.innerHTML = "";
            pageProducts.forEach((product) => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><strong>${product.id}</strong></td>
                    <td>${product.marca}</td>
                    <td>${product.modelo}</td>
                    <td><strong>${product.stock}</strong></td>
                `;
                productsTable.appendChild(row);
            });
        }
        function displayPagination() {
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
            pagination.innerHTML = "";
            const prevBtn = document.createElement("button");
            prevBtn.textContent = "Anterior";
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener("click", () => {
                if (currentPage > 1) {
                    currentPage--;
                    displayProducts();
                    displayPagination();
                    updateResultsInfo();
                }
            });
            pagination.appendChild(prevBtn);
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement("button");
                pageBtn.textContent = i;
                pageBtn.classList.toggle("active", i === currentPage);
                pageBtn.addEventListener("click", () => {
                    currentPage = i;
                    displayProducts();
                    displayPagination();
                    updateResultsInfo();
                });
                pagination.appendChild(pageBtn);
            }
            const nextBtn = document.createElement("button");
            nextBtn.textContent = "Siguiente";
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener("click", () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    displayProducts();
                    displayPagination();
                    updateResultsInfo();
                }
            });
            pagination.appendChild(nextBtn);
        }
        function updateResultsInfo() {
            const start = (currentPage - 1) * itemsPerPage + 1;
            const end = Math.min(start + itemsPerPage - 1, filteredProducts.length);
            const total = filteredProducts.length;
            if (total === 0) {
                resultsInfo.textContent = "No se encontraron resultados";
            } else {
                resultsInfo.textContent = `Mostrando ${start}-${end} de ${total} resultados`;
            }
        }
        displayProducts();
        displayPagination();
        updateResultsInfo();
        </script>
    </div>
</body>
</html>
